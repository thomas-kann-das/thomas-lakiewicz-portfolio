backend:
  name: git-gateway
  branch: main

media_folder: media
public_folder: /media

locale: de

show_preview_links: false

slug:
  encoding: ascii
  clean_accents: true

collections:

  # ── Slider ────────────────────────────────────────
  - name: slider
    label: "🖼️  Slider — Bilder & Videos"
    label_singular: "Slide"
    folder: _slides
    create: true
    delete: true
    slug: "slide-{{order}}"
    summary: "{{order}} — {{label}}"
    sortable_fields: ['order']
    fields:
      - label: "Reihenfolge (1 = erster Slide)"
        name: order
        widget: number
        value_type: int
        min: 1
        hint: "Niedrigere Zahl = weiter vorne im Slider"
      - label: "Label (unten rechts im Bild)"
        name: label
        widget: string
        hint: "Kurzer Begriff, z.B. 'branding' oder 'editorial'"
      - label: "Typ"
        name: type
        widget: select
        options:
          - { label: "Bild (JPG, PNG, WebP)", value: "image" }
          - { label: "Video (MP4)", value: "video" }
        default: "image"
      - label: "Bild hochladen"
        name: image
        widget: image
        required: false
        hint: "Nur ausfüllen wenn Typ = Bild. Empfohlen: JPG, mindestens 1800px breit, Querformat."
        choose_url: false
      - label: "Video hochladen"
        name: video
        widget: file
        required: false
        hint: "Nur ausfüllen wenn Typ = Video. Empfohlen: MP4, max. 20MB, ohne Ton."
        media_library:
          config:
            multiple: false

  # ── Profil ────────────────────────────────────────
  - name: profil
    label: "👤  Profil — Über mich"
    files:
      - label: "Profil-Seite bearbeiten"
        name: profil
        file: _data/profil.json
        fields:
          - label: "Begrüßung (erste Zeile)"
            name: intro
            widget: string
            hint: "z.B. 'hi — thank you for visiting my page.'"
          - label: "Absatz 1"
            name: absatz1
            widget: text
            hint: "Kurze Vorstellung — wer bist du, wo bist du ansässig?"
          - label: "Absatz 2"
            name: absatz2
            widget: text
            hint: "Deine Erfahrung und was dich begeistert"
          - label: "Absatz 3"
            name: absatz3
            widget: text
            hint: "Dein Hintergrund und Schwerpunkt"
          - label: "Absatz 4"
            name: absatz4
            widget: text
            hint: "Deine Arbeitsweise und Werte"
          - label: "Abschluss-Satz (hervorgehoben)"
            name: abschluss
            widget: string
            hint: "Der Call-to-Action am Ende, z.B. 'Don't be shy and come in contact…'"
          - label: "Statistiken"
            name: stats
            widget: list
            hint: "Die drei Kennzahlen rechts (z.B. +15 Jahre Erfahrung)"
            fields:
              - { label: "Zahl (z.B. +15)", name: zahl, widget: string }
              - { label: "Beschreibung (z.B. years professional Experience)", name: beschreibung, widget: string }

  # ── Leistungen ────────────────────────────────────
  - name: leistungen
    label: "⚡  Leistungen — Services"
    files:
      - label: "Leistungen-Seite bearbeiten"
        name: leistungen
        file: _data/leistungen.json
        fields:
          - label: "Einleitungstext (linke Spalte)"
            name: intro
            widget: list
            hint: "Kurze Absätze die deine Arbeitsweise beschreiben"
            field: { label: "Absatz", name: text, widget: text }
          - label: "Leistungsbereiche"
            name: bereiche
            widget: list
            hint: "Die drei Hauptbereiche: strategy, creation, execution"
            fields:
              - label: "Name des Bereichs (groß dargestellt)"
                name: name
                widget: string
                hint: "z.B. 'strategy' — wird sehr groß angezeigt"
              - label: "Einzelne Leistungen"
                name: items
                widget: list
                hint: "Die aufgelisteten Services in diesem Bereich"
                field: { label: "Leistung", name: item, widget: string }

  # ── Home ──────────────────────────────────────────
  - name: home
    label: "🏠  Home — Startseite"
    files:
      - label: "Startseite bearbeiten"
        name: home
        file: _data/home.json
        fields:
          - label: "Headline (große Schrift auf der Startseite)"
            name: headline
            widget: string
            hint: "z.B. 'communication design.' — erscheint groß unten links"
          - label: "Zeilenumbruch nach dem ersten Wort?"
            name: headline_break
            widget: boolean
            default: true
            hint: "Ein = 'communication' und 'design.' stehen auf zwei Zeilen"

  # ── Impressum ─────────────────────────────────────
  - name: impressum
    label: "📋  Impressum"
    files:
      - label: "Impressum bearbeiten"
        name: impressum
        file: _data/impressum.json
        fields:
          - label: "Name"
            name: name
            widget: string
            hint: "z.B. Thomas Lakiewicz"
          - label: "Straße und Hausnummer"
            name: strasse
            widget: string
          - label: "PLZ und Ort"
            name: ort
            widget: string
          - label: "Land"
            name: land
            widget: string
            default: "Deutschland"
          - label: "E-Mail-Adresse"
            name: email
            widget: string
            hint: "Wird als klickbarer Link angezeigt"
          - label: "Haftung für Inhalte"
            name: haftung_inhalte
            widget: text
            hint: "Pflichttext — nur ändern wenn nötig"
          - label: "Haftung für Links"
            name: haftung_links
            widget: text
            hint: "Pflichttext — nur ändern wenn nötig"
          - label: "Urheberrecht"
            name: urheberrecht
            widget: text
            hint: "Pflichttext — nur ändern wenn nötig"
          - label: "Datenschutz"
            name: datenschutz
            widget: text
            hint: "Pflichttext — nur ändern wenn nötig"

  # ── Social Media & Links ──────────────────────────
  - name: einstellungen
    label: "⚙️  Einstellungen — Links & Kontakt"
    files:
      - label: "Links & Kontakt bearbeiten"
        name: einstellungen
        file: _data/einstellungen.json
        fields:
          - label: "E-Mail-Adresse (Kontakt-Link in Navigation)"
            name: email
            widget: string
            hint: "z.B. hello@thomaslakiewicz.de"
          - label: "LinkedIn-URL"
            name: linkedin
            widget: string
            hint: "z.B. https://linkedin.com/in/thomas-lakiewicz"
          - label: "Instagram-URL"
            name: instagram
            widget: string
            hint: "z.B. https://instagram.com/thomaslakiewicz"
          - label: "Name in der Navigation (neben Logo)"
            name: nav_name
            widget: string
            hint: "z.B. thomas lakiewicz"


  # ── Typografie ────────────────────────────────────
  - name: typografie
    label: "🔤  Typografie — Schrift & Layout"
    files:
      - label: "Typografie-Einstellungen"
        name: typografie
        file: _data/typografie.json
        fields:

          - label: "🏠 Headline (Startseite)"
            name: headline
            widget: object
            collapsed: false
            summary: "Größe: {{fields.size}}px · {{fields.weight}} · {{fields.align}}"
            fields:
              - { label: "Schriftgröße (px)", name: size, widget: number, default: 96, value_type: int, min: 32, max: 200, hint: "Auf kleinen Bildschirmen wird sie automatisch kleiner" }
              - label: "Schriftschnitt"
                name: weight
                widget: select
                options:
                  - { label: "Light (dünn)", value: "300" }
                  - { label: "Retina (normal)", value: "350" }
                default: "350"
              - label: "Textausrichtung"
                name: align
                widget: select
                options:
                  - { label: "Links", value: "left" }
                  - { label: "Zentriert", value: "center" }
                  - { label: "Rechts", value: "right" }
                default: "left"
              - { label: "Zeilenabstand", name: line_height, widget: number, default: 1.0, value_type: float, min: 0.8, max: 2.0, step: 0.05, hint: "1.0 = eng · 1.5 = normal · 2.0 = weit" }
              - { label: "Buchstabenabstand (em)", name: letter_spacing, widget: number, default: -0.03, value_type: float, min: -0.1, max: 0.2, step: 0.01 }

          - label: "🧭 Navigation"
            name: navigation
            widget: object
            collapsed: true
            fields:
              - { label: "Nav-Name Schriftgröße (px)", name: nav_size, widget: number, default: 22, value_type: int, min: 12, max: 48 }
              - label: "Nav-Name Schriftschnitt"
                name: nav_weight
                widget: select
                options:
                  - { label: "Light (dünn)", value: "300" }
                  - { label: "Retina (normal)", value: "350" }
                default: "350"
              - { label: "Nav-Links Schriftgröße (px)", name: nav_link_size, widget: number, default: 16, value_type: int, min: 10, max: 32 }

          - label: "👤 Profil — Texte"
            name: profil
            widget: object
            collapsed: true
            fields:
              - { label: "Schriftgröße (px)", name: size, widget: number, default: 17, value_type: int, min: 12, max: 32 }
              - label: "Schriftschnitt"
                name: weight
                widget: select
                options:
                  - { label: "Light (dünn)", value: "300" }
                  - { label: "Retina (normal)", value: "350" }
                default: "300"
              - label: "Textausrichtung"
                name: align
                widget: select
                options:
                  - { label: "Links", value: "left" }
                  - { label: "Zentriert", value: "center" }
                  - { label: "Rechts", value: "right" }
                default: "left"
              - { label: "Zeilenabstand", name: line_height, widget: number, default: 1.8, value_type: float, min: 1.0, max: 3.0, step: 0.05 }
              - { label: "Buchstabenabstand (em)", name: letter_spacing, widget: number, default: 0.04, value_type: float, min: -0.05, max: 0.2, step: 0.01 }

          - label: "📊 Profil — Statistiken"
            name: stats
            widget: object
            collapsed: true
            fields:
              - { label: "Zahlen Schriftgröße (px)", name: number_size, widget: number, default: 96, value_type: int, min: 32, max: 160 }
              - label: "Zahlen Schriftschnitt"
                name: number_weight
                widget: select
                options:
                  - { label: "Light (dünn)", value: "300" }
                  - { label: "Retina (normal)", value: "350" }
                default: "350"
              - { label: "Label Schriftgröße (px)", name: label_size, widget: number, default: 22, value_type: int, min: 12, max: 48 }

          - label: "⚡ Leistungen — Service-Namen"
            name: service_name
            widget: object
            collapsed: true
            fields:
              - { label: "Schriftgröße (px)", name: size, widget: number, default: 80, value_type: int, min: 32, max: 160 }
              - label: "Schriftschnitt"
                name: weight
                widget: select
                options:
                  - { label: "Light (dünn)", value: "300" }
                  - { label: "Retina (normal)", value: "350" }
                default: "350"
              - label: "Textausrichtung"
                name: align
                widget: select
                options:
                  - { label: "Links", value: "left" }
                  - { label: "Zentriert", value: "center" }
                  - { label: "Rechts", value: "right" }
                default: "right"

          - label: "⚡ Leistungen — Items"
            name: service_items
            widget: object
            collapsed: true
            fields:
              - { label: "Schriftgröße (px)", name: size, widget: number, default: 18, value_type: int, min: 10, max: 32 }
              - label: "Schriftschnitt"
                name: weight
                widget: select
                options:
                  - { label: "Light (dünn)", value: "300" }
                  - { label: "Retina (normal)", value: "350" }
                default: "300"
              - { label: "Zeilenabstand", name: line_height, widget: number, default: 1.7, value_type: float, min: 1.0, max: 3.0, step: 0.05 }

          - label: "🎬 Animationen"
            name: animation
            widget: object
            collapsed: false
            summary: "{{fields.type}} · {{fields.speed}}"
            fields:
              - label: "Animations-Stil"
                name: type
                widget: select
                options:
                  - { label: "Mask Reveal (empfohlen — cinematic)", value: "mask" }
                  - { label: "Wörter gleiten ein", value: "words" }
                  - { label: "Buchstaben erscheinen einzeln", value: "chars" }
                  - { label: "Fade + Bewegung (subtil)", value: "fade" }
                  - { label: "Keine Animation", value: "none" }
                default: "mask"
              - label: "Geschwindigkeit"
                name: speed
                widget: select
                options:
                  - { label: "Langsam (1.0s)", value: "slow" }
                  - { label: "Normal (0.65s)", value: "normal" }
                  - { label: "Schnell (0.35s)", value: "fast" }
                default: "normal"
              - label: "Verzögerung beim Seitenaufruf (Sekunden)"
                name: delay
                widget: number
                default: 0.3
                value_type: float
                min: 0
                max: 2.0
                step: 0.1
                hint: "0 = sofort · 0.3 = kurze Pause · 1.0 = deutliche Pause"
