backend:
  name: git-gateway
  branch: main

media_folder: media
public_folder: /media

locale: de

collections:

  # ── Slider ────────────────────────────────────────
  - name: slider
    label: Slider
    label_singular: Slide
    folder: _slides
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{order}} — {{label}}"
    fields:
      - label: Reihenfolge
        name: order
        widget: number
        hint: "Niedrigere Zahl = weiter vorne im Slider (1, 2, 3 ...)"
      - label: Label (unten rechts)
        name: label
        widget: string
        hint: "Kurzer Begriff der unten rechts angezeigt wird, z.B. 'branding'"
      - label: Medientyp
        name: type
        widget: select
        options:
          - { label: "Bild", value: "image" }
          - { label: "Video", value: "video" }
        default: image
      - label: Bild
        name: image
        widget: image
        required: false
        hint: "Nur ausfüllen wenn Medientyp = Bild. Empfohlen: JPG, min. 1800px breit."
      - label: Video
        name: video
        widget: file
        required: false
        hint: "Nur ausfüllen wenn Medientyp = Video. Empfohlen: MP4, max. 20MB."

  # ── Profil ────────────────────────────────────────
  - name: profil
    label: Profil
    files:
      - label: Profil-Seite
        name: profil
        file: _data/profil.json
        fields:
          - label: Einleitungstext
            name: intro
            widget: text
            hint: "Erste Zeile auf der Profil-Seite"
          - label: Absatz 1
            name: absatz1
            widget: text
          - label: Absatz 2
            name: absatz2
            widget: text
          - label: Absatz 3
            name: absatz3
            widget: text
          - label: Abschluss-Satz
            name: abschluss
            widget: text
            hint: "Der hervorgehobene Satz am Ende"
          - label: Statistiken
            name: stats
            widget: list
            fields:
              - { label: Zahl, name: zahl, widget: string }
              - { label: Beschreibung, name: beschreibung, widget: string }

  # ── Leistungen ────────────────────────────────────
  - name: leistungen
    label: Leistungen
    files:
      - label: Leistungen-Seite
        name: leistungen
        file: _data/leistungen.json
        fields:
          - label: Einleitungstext
            name: intro
            widget: list
            field: { label: Absatz, name: text, widget: text }
          - label: Leistungsbereiche
            name: bereiche
            widget: list
            fields:
              - { label: Name (groß), name: name, widget: string, hint: "z.B. strategy" }
              - label: Einzelne Leistungen
                name: items
                widget: list
                field: { label: Leistung, name: item, widget: string }
